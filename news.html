<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>News & Resources | TwirlPower</title>
  <meta name="description" content="Guides, product updates, and strategy for the competitive baton twirling community." />
  <link rel="icon" href="/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <meta property="og:image" content="/og-default.png" />

  <meta property="og:image:height" content="630" />

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --teal: #0d9488; --teal-dark: #0f766e; --pink: #e11d6a;
      --navy: #0f172a; --navy2: #1e293b; --slate: #475569; --muted: #94a3b8;
      --border: #e2e8f0; --bg: #f8fafc; --card: #ffffff; --radius: 12px;
    }
    body { font-family: 'DM Sans', sans-serif; color: var(--navy); background: var(--bg); -webkit-font-smoothing: antialiased; }
    h1, h2, h3 { font-family: 'DM Serif Display', serif; line-height: 1.2; }
    a { text-decoration: none; color: inherit; }
    .container { max-width: 1120px; margin: 0 auto; padding: 0 24px; }

    /* NAV */
    .nav { position: sticky; top: 0; z-index: 200; background: rgba(15,23,42,.96); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,.07); }
    .nav-inner { max-width: 1120px; margin: 0 auto; padding: 0 24px; height: 62px; display: flex; align-items: center; gap: 32px; }
    .nav-logo { font-family: 'DM Serif Display', serif; font-size: 22px; color: #fff; flex-shrink: 0; }
    .nav-logo span { color: var(--pink); }
    .nav-brand { display:flex; align-items:center; gap:14px; flex-shrink:0; }
    .nav-tagline { font-family:'DM Sans',sans-serif; font-size:12px; font-weight:400; color:rgba(255,255,255,.6); letter-spacing:.02em; padding-left:14px; border-left:1px solid rgba(255,255,255,.18); }
    @media (max-width:768px){ .nav-tagline { display:none; } }
    .nav-links { display: flex; align-items: center; gap: 4px; flex: 1; }
    .nav-link { font-size: 14px; font-weight: 500; color: var(--muted); padding: 6px 12px; border-radius: 7px; transition: color .15s, background .15s; }
    .nav-link:hover { color: #fff; background: rgba(255,255,255,.07); }
    .nav-link.active { color: var(--teal); }
    .nav-cta { margin-left: auto; background: var(--teal); color: #fff; font-size: 13px; font-weight: 700; padding: 8px 18px; border-radius: 8px; transition: background .15s; flex-shrink: 0; }
    .nav-cta:hover { background: var(--teal-dark); color: #fff; }
    .nav-mobile-btn { display: none; background: none; border: none; cursor: pointer; color: #fff; margin-left: auto; padding: 4px; }
    .nav-mobile-menu { display: none; flex-direction: column; background: var(--navy2); border-top: 1px solid rgba(255,255,255,.08); padding: 12px 0; }
    .nav-mobile-menu.open { display: flex; }
    .nav-mobile-menu a { font-size: 15px; font-weight: 500; color: var(--muted); padding: 12px 24px; }

    /* HERO */
    .hero { background: var(--navy); padding: 72px 0 60px; position: relative; overflow: hidden; }
    .hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 70% 0%, rgba(13,148,136,.3) 0%, transparent 55%); pointer-events: none; }
    .hero .container { position: relative; }
    .hero-eyebrow { display: inline-block; background: rgba(13,148,136,.15); color: #5eead4; font-size: 12px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; padding: 5px 14px; border-radius: 99px; border: 1px solid rgba(13,148,136,.25); margin-bottom: 20px; }
    .hero h1 { font-size: clamp(32px, 5vw, 48px); color: #fff; margin-bottom: 14px; }
    .hero p { font-size: 17px; color: var(--muted); max-width: 520px; line-height: 1.65; }

    /* CONTENT */
    .content { max-width: 1000px; margin: 0 auto; padding: 48px 24px 88px; }

    /* FILTER BAR */
    .filter-bar { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 36px; }
    .filter-btn { font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; padding: 8px 18px; border-radius: 99px; border: 1px solid var(--border); background: var(--card); color: var(--slate); cursor: pointer; transition: all .15s; }
    .filter-btn:hover { border-color: var(--teal); color: var(--teal); }
    .filter-btn.active { background: var(--teal); border-color: var(--teal); color: #fff; }

    /* CARD GRID */
    .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    .article-card { display: flex; flex-direction: column; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 26px; transition: box-shadow .2s, transform .2s; }
    .article-card:hover { box-shadow: 0 12px 40px rgba(0,0,0,.1); transform: translateY(-2px); }
    .card-top { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
    .card-badge { display: inline-block; background: rgba(13,148,136,.1); color: var(--teal); font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; padding: 4px 11px; border-radius: 99px; }
    .card-date { font-size: 13px; color: var(--muted); flex-shrink: 0; }
    .article-card h2 { font-size: 21px; color: var(--navy); line-height: 1.28; margin-bottom: 10px; }
    .card-excerpt { font-size: 14.5px; color: var(--slate); line-height: 1.65; margin-bottom: 18px; flex: 1; }
    .card-readmore { align-self: flex-start; font-size: 14px; font-weight: 600; color: var(--teal); transition: color .15s; }
    .article-card:hover .card-readmore { color: var(--teal-dark); }

    /* STATES */
    .grid-state { grid-column: 1 / -1; text-align: center; padding: 64px 24px; }
    .grid-state .icon { font-size: 40px; margin-bottom: 14px; }
    .grid-state h2 { font-size: 22px; color: var(--navy); margin-bottom: 8px; }
    .grid-state p { font-size: 15px; color: var(--slate); line-height: 1.6; max-width: 380px; margin: 0 auto; }

    /* FOOTER */
    .footer { background: var(--navy); border-top: 1px solid rgba(255,255,255,.07); padding: 56px 0 32px; }
    .footer-inner { display: grid; grid-template-columns: 1.5fr 1fr 1fr 1fr; gap: 48px; padding-bottom: 48px; border-bottom: 1px solid rgba(255,255,255,.07); }
    .footer-brand-logo { font-family: 'DM Serif Display', serif; font-size: 24px; color: #fff; margin-bottom: 10px; }
    .footer-brand-logo span { color: var(--pink); }
    .footer-tagline { font-family: 'DM Sans', sans-serif; font-size: 13px; color: rgba(255,255,255,.72); letter-spacing: .02em; margin-bottom: 14px; }
    .footer-narrative { font-size: 13px; color: rgba(255,255,255,.5); line-height: 1.6; max-width: 480px; margin-bottom: 20px; }
    .footer-brand p { font-size: 14px; color: var(--muted); line-height: 1.6; margin-bottom: 20px; }
    .footer-col-head { font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: #fff; margin-bottom: 16px; }
    .footer-col a { display: block; font-size: 14px; color: var(--muted); margin-bottom: 10px; transition: color .15s; }
    .footer-col a:hover { color: #fff; }
    .footer-bottom { padding-top: 28px; display: flex; align-items: center; justify-content: space-between; font-size: 13px; color: var(--muted); flex-wrap: wrap; gap: 12px; }
    .btn { display: inline-flex; align-items: center; gap: 7px; font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 15px; padding: 12px 24px; border-radius: 9px; border: none; cursor: pointer; transition: all .18s; text-decoration: none; }
    .btn-primary { background: var(--teal); color: #fff; }
    .btn-primary:hover { background: var(--teal-dark); color: #fff; transform: translateY(-1px); }

    @media (max-width: 900px) {
      .footer-inner { grid-template-columns: 1fr 1fr; }
      .nav-links, .nav-cta { display: none; }
      .nav-mobile-btn { display: flex; }
    }
    @media (max-width: 680px) {
      .card-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 560px) {
      .footer-inner { grid-template-columns: 1fr; }
    }
  </style>

</head>
<body>

<header id="site-header"></header>

<div class="hero">
  <div class="container">
    <div class="hero-eyebrow">Articles · Guides · Updates</div>
    <h1>TwirlPower News &amp; Resources</h1>
    <p>Guides, product updates, and strategy for the competitive baton twirling community.</p>
  </div>
</div>

<div class="content">
  <div class="filter-bar" id="filters">
    <button class="filter-btn active" data-cat="All">All</button>
    <button class="filter-btn" data-cat="Education">Education</button>
    <button class="filter-btn" data-cat="News">News</button>
    <button class="filter-btn" data-cat="Tips & Strategy">Tips &amp; Strategy</button>
    <button class="filter-btn" data-cat="TwirlPower Updates">TwirlPower Updates</button>
  </div>

  <div class="card-grid" id="grid">
    <div class="grid-state"><p>Loading articles…</p></div>
  </div>
</div>

<footer id="site-footer"></footer>

<script>
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  let articles = [];
  let activeCategory = 'All';

  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
  }
  // Parse 'YYYY-MM-DD' manually so there's no timezone shift from Date().
  function fmtDate(iso) {
    const m = /^(\d{4})-(\d{2})-(\d{2})/.exec(iso || '');
    if (!m) return esc(iso);
    return MONTHS[parseInt(m[2], 10) - 1] + ' ' + parseInt(m[3], 10) + ', ' + m[1];
  }

  function render() {
    const grid = document.getElementById('grid');
    const list = activeCategory === 'All'
      ? articles
      : articles.filter(a => a.category === activeCategory);

    if (!list.length) {
      grid.innerHTML = '<div class="grid-state"><div class="icon">📭</div><h2>No articles yet</h2>'
        + '<p>There\'s nothing in this category right now — check back soon.</p></div>';
      return;
    }

    grid.innerHTML = list.map(a => `
      <a class="article-card" href="/article.html?slug=${encodeURIComponent(a.slug)}">
        <div class="card-top">
          <span class="card-badge">${esc(a.category)}</span>
          <span class="card-date">${fmtDate(a.date)}</span>
        </div>
        <h2>${esc(a.title)}</h2>
        <p class="card-excerpt">${esc(a.excerpt)}</p>
        <span class="card-readmore">Read More →</span>
      </a>`).join('');
  }

  // Filter buttons are in the HTML so the bar shows even if the fetch fails.
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      activeCategory = btn.getAttribute('data-cat');
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b === btn));
      render();
    });
  });

  fetch('/articles/data.json')
    .then(r => { if (!r.ok) throw new Error('load failed'); return r.json(); })
    .then(data => {
      articles = (Array.isArray(data) ? data : []).slice()
        .sort((a, b) => String(b.date || '').localeCompare(String(a.date || '')));
      render();
    })
    .catch(() => {
      document.getElementById('grid').innerHTML =
        '<div class="grid-state"><div class="icon">⚠️</div><h2>Couldn\'t load articles</h2>'
        + '<p>Please refresh the page to try again.</p></div>';
    });

  document.querySelectorAll('.nav-mobile-menu a').forEach(a => {
    a.addEventListener('click', () => document.getElementById('mob').classList.remove('open'));
  });
</script>

  <script src="/header.js"></script>
  <script src="/footer.js"></script>
</body>
</html>
