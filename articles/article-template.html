<!--
  ╔══════════════════════════════════════════════════════════════════════════╗
  ║  TWIRLPOWER ARTICLE PARTIAL TEMPLATE                                        ║
  ║                                                                            ║
  ║  Articles are now style-free PARTIALS injected into /article.html.         ║
  ║  This file is ONLY the article body — the shell (/article.html) provides   ║
  ║  the <html>, <head>, nav, hero, footer, and ALL css.                       ║
  ║                                                                            ║
  ║  To publish a new article:                                                 ║
  ║   1. Copy this file to  articles/<your-slug>.html                          ║
  ║      (slug = lowercase, hyphenated; must match the "slug" in data.json).   ║
  ║   2. Write the body below using ONLY these existing class names — do NOT   ║
  ║      add <style>, <nav>, <footer>, or a hero. The shell styles them:       ║
  ║         <article class="article-body"> … </article>   (prose)              ║
  ║         <section class="article-cta"><div class="cta-inner"> … </div>      ║
  ║      Inside .article-body use <p>, <h2>, <ul><li>, <strong>, and links     ║
  ║      styled inline with style="color:var(--teal);font-weight:600;".        ║
  ║   3. Add a matching entry to articles/data.json (title, date, category,    ║
  ║      author, excerpt). Category must be one of:                            ║
  ║         Education · News · Tips & Strategy · TwirlPower Updates             ║
  ║   4. Commit & push — Vercel auto-deploys. The live URL is                  ║
  ║         /article.html?slug=<your-slug>                                      ║
  ║      (the News page links here automatically once data.json is updated).   ║
  ╚══════════════════════════════════════════════════════════════════════════╝
-->
<article class="article-body">
  <p>Write the opening paragraph here. Use <strong>strong</strong> for emphasis and
    <a href="https://app.twirlpower.com" style="color:var(--teal);font-weight:600;">inline links</a> in teal.</p>

  <h2>A section heading</h2>
  <p>Body copy for the section.</p>
  <ul>
    <li>List item one</li>
    <li>List item two</li>
  </ul>

  <p>Closing paragraph.</p>
</article>

<section class="article-cta">
  <div class="cta-inner">
    <h2>Closing call to action</h2>
    <p>One or two sentences pointing readers to the app or another next step.</p>
    <a href="https://app.twirlpower.com" class="btn btn-primary" target="_blank">Open App →</a>
  </div>
</section>
